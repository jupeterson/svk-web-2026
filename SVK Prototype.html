<style type="text/tailwindcss">
  @layer components {
    .container-svk { @apply max-w-screen-xl mx-auto px-6; }
    .card { @apply bg-white border border-svk-border rounded-[10px] overflow-hidden; }
    .card-hover { @apply transition-all duration-200; }
    .input { @apply font-sans text-sm w-full px-3 py-2.5 bg-white border border-svk-border rounded-md text-svk-ink-900 placeholder:text-svk-ink-500 focus:border-svk-green-500 outline-none; }

    .btn { @apply inline-flex items-center gap-2 font-semibold rounded-md transition-colors duration-150 whitespace-nowrap no-underline; }
    .btn-primary { @apply btn bg-svk-green-600 text-white hover:bg-svk-green-700 px-5 py-2.5 text-sm; }
    .btn-secondary { @apply btn bg-white text-svk-green-700 border border-svk-border-s hover:bg-svk-green-50 px-5 py-2.5 text-sm; }
    .btn-ghost { @apply btn text-svk-green-700 hover:bg-svk-green-50 px-3.5 py-1.5 text-xs; }
    .btn-accent { @apply btn bg-svk-orange-500 text-white hover:bg-svk-orange-600 px-5 py-2.5 text-sm; }
    .btn-dark { @apply btn bg-svk-ink-900 text-white hover:bg-svk-ink-800 px-5 py-2.5 text-sm; }
    .btn-sm { @apply px-3.5 py-1.5 text-xs; }
    .btn-lg { @apply px-6 py-3.5 text-base; }

    .eyebrow { @apply text-[11px] font-semibold tracking-[0.14em] uppercase; }

    .prose-svk p { @apply text-[16px] leading-[1.72] text-svk-ink-800 mb-5; }
    .prose-svk h2 { @apply font-serif text-[30px] font-semibold text-svk-ink-900 tracking-svk-tight mt-12 mb-4 leading-[1.15]; }
    .prose-svk h3 { @apply font-serif text-[22px] font-semibold text-svk-ink-900 tracking-svk-tight mt-8 mb-3; }
    .prose-svk ul { @apply list-disc pl-6 mb-5 text-svk-ink-800 leading-[1.7]; }
    .prose-svk blockquote { @apply font-serif text-[22px] text-svk-ink-800 italic border-l-[2px] border-svk-green-500 pl-5 my-8; }
    .prose-svk table { @apply w-full border-collapse my-8 text-[14.5px]; }
    .prose-svk thead { @apply bg-svk-surface-2; }
    .prose-svk th { @apply text-left font-semibold text-svk-ink-900 px-4 py-3 border-b-2 border-svk-border-s text-[12px] uppercase tracking-[0.08em]; }
    .prose-svk td { @apply px-4 py-3 border-b border-svk-border text-svk-ink-800 align-top leading-[1.55]; }
    .prose-svk tbody tr:hover { @apply bg-svk-surface-2/40; }
    .prose-svk tbody tr:last-child td { @apply border-b-0; }
  }
  html, body { background: #fbfaf7; color: #262b27; font-family: Manrope, ui-sans-serif, system-ui, sans-serif; }
  a { color: inherit; }
  a.no-underline, a.no-underline:hover { text-decoration: none; }
  .link-arrow { display: inline-flex; align-items: center; gap: 4px; transition: gap 200ms; }
  .link-arrow:hover { gap: 8px; }
  ::selection { background: #cfdba0; color: #163420; }
  /* leaflet attr */
  .leaflet-container { font-family: Manrope, sans-serif; background: #e8eadf; }
  .leaflet-popup-content-wrapper { border-radius: 8px; }
  .fade-in-up { animation: fade-in-up 440ms ease-out both; }
  @keyframes fade-in-up { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
</style>

<body class="bg-svk-bg text-svk-ink-800 font-sans antialiased">
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shared/router.jsx"></script>
<script type="text/babel" src="shared/icons.jsx"></script>
<script type="text/babel" src="shared/primitives.jsx"></script>
<script type="text/babel" src="shared/data.jsx"></script>
<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel" src="shared/chrome.jsx"></script>
<script type="text/babel" src="shared/pages.jsx"></script>
<script type="text/babel" src="shared/provform.jsx"></script>
<script type="text/babel" src="shared/breeds.jsx"></script>

<script type="text/babel" data-presets="env,react">
function AppRouter() {
  const path = usePathname();

  // /lokal/:slug
  const lokalMatch = matchRoute("/lokal/:slug", path);
  if (lokalMatch) return <LocalClubPage slug={lokalMatch.slug}/>;

  // /nyheter/:slug (article)
  const articleMatch = matchRoute("/nyheter/:slug", path);
  if (articleMatch) return <ArticlePage slug={articleMatch.slug}/>;
  if (path === "/nyheter") return <ArticlePage slug="nya-regler-jaktprov-2025"/>;

  if (path === "/" || path === "") return <HomePage/>;
  if (path === "/aktiviteter") return <ActivitiesPage/>;
  if (path === "/riksprovet") return <RiksprovetPage/>;
  if (path === "/riksutstallning") return <RiksutstallningPage/>;
  if (path === "/funktionarer") return <FunktionarerPage/>;

  // /provform/:slug
  const provMatch = matchRoute("/provform/:slug", path);
  if (provMatch) return <ProvformPage slug={provMatch.slug}/>;

  // /raser hub + /raser/:slug
  if (path === "/raser") return <BreedHubPage/>;
  const breedMatch = matchRoute("/raser/:slug", path);
  if (breedMatch) return <BreedDetailPage slug={breedMatch.slug}/>;

  return <GenericPage/>;
}

function App() {
  return (
    <RouterProvider>
      <div className="bg-svk-bg min-h-screen flex flex-col">
        <TopNav/>
        <div className="flex-1"><AppRouter/></div>
        <Footer/>
      </div>
    </RouterProvider>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
